services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - VECTOR_STORE_PATH=/app/vector_store
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=sqlite+aiosqlite:///./smartprep.db
    volumes:
      - vector_store:/app/vector_store
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes env vars at BUILD TIME — must be passed as build arg
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Sandboxed code execution (P2 — Judge0 / Piston replacement using Docker)
  sandbox:
    image: ghcr.io/engineer-man/piston:latest
    ports:
      - "2000:2000"
    restart: unless-stopped
    tmpfs:
      - /tmp/piston:exec,size=512m
    profiles:
      - sandbox  # opt-in: docker compose --profile sandbox up

volumes:
  vector_store:
  sqlite_data:
